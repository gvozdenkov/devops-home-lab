---
- name: Ensure caddy config directories exist
  ansible.builtin.file:
    path: '{{ item }}'
    state: directory
    mode: '0755'
  loop:
    - '{{ caddy_config_dir }}'
    - '{{ caddy_data_dir }}'

- name: Build basic Caddyfile with reverse proxy sites
  ansible.builtin.copy:
    dest: '{{ caddy_config_file }}'
    mode: '0644'
    content: |
      # Generated by ansible, do not touch manual
      {
        admin :{{ caddy_admin_port }}
      }
      {% for site in caddy_sites %}
      {{ site.name }} {
          reverse_proxy 127.0.0.1:{{ site.port }}
      }
      {% endfor %}
  notify: Restart caddy container

- name: Run Caddy container with Podman
  become: false
  containers.podman.podman_container:
    name: '{{ caddy_container_name }}'
    image: '{{ caddy_image }}'
    state: started
    restart_policy: '{{ caddy_restart_policy }}'
    network: host
    # ports:
    #   - '{{ caddy_port_http }}:80'
    #   - '{{ caddy_port_https }}:443'
    volumes:
      - '{{ caddy_config_file }}:/etc/caddy/Caddyfile:Z'
      - '{{ caddy_data_dir }}:/data:Z'
    generate_systemd:
      path: ~/.config/systemd/user/
